<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AttendSecure - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#004d65",
                        "surface-tint": "#d9b9ff",
                        "primary-fixed-dim": "#d9b9ff",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#373339",
                        "on-primary-fixed-variant": "#57377f",
                        "on-secondary-container": "#abb5f4",
                        "surface-container-high": "#2c292e",
                        "on-surface": "#e7e0e7",
                        "on-primary": "#3f1e66",
                        "secondary-container": "#3b457c",
                        "surface-container-low": "#1d1a20",
                        "inverse-surface": "#e7e0e7",
                        "surface-container-highest": "#373339",
                        "surface-bright": "#3b383d",
                        "tertiary-fixed": "#bee9ff",
                        "surface-dim": "#151217",
                        "on-secondary-fixed": "#09154c",
                        "on-secondary": "#212c62",
                        "on-error": "#690005",
                        "surface": "#151217",
                        "outline-variant": "#4a444f",
                        "primary-container": "#cba6f7",
                        "on-surface-variant": "#cdc3d1",
                        "on-tertiary": "#003546",
                        "on-secondary-fixed-variant": "#38437a",
                        "inverse-on-surface": "#322f35",
                        "background": "#151217",
                        "on-primary-fixed": "#290350",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#001f2a",
                        "surface-container": "#211e24",
                        "inverse-primary": "#704f98",
                        "tertiary": "#8fdbff",
                        "on-background": "#e7e0e7",
                        "secondary-fixed-dim": "#bac3ff",
                        "tertiary-container": "#6dc0e5",
                        "surface-container-lowest": "#100d12",
                        "primary-fixed": "#eedbff",
                        "on-primary-container": "#57377f",
                        "secondary-fixed": "#dee0ff",
                        "on-tertiary-fixed-variant": "#004d65",
                        "secondary": "#bac3ff",
                        "outline": "#968e9a",
                        "tertiary-fixed-dim": "#7ed1f6",
                        "primary": "#e2c7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "unit": "4px",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["JetBrains Mono"],
                        "code-inline": ["JetBrains Mono"],
                        "label-md": ["JetBrains Mono"],
                        "headline-lg-mobile": ["JetBrains Mono"],
                        "body-lg": ["JetBrains Mono"],
                        "headline-md": ["JetBrains Mono"],
                        "body-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "code-inline": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #151217;
            background-image:
                linear-gradient(rgba(74, 68, 79, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 68, 79, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 50;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(203, 166, 247, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% {
                transform: translateY(-100vh);
            }

            100% {
                transform: translateY(100vh);
            }
        }

        .terminal-input:focus+.cursor {
            display: inline-block;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-lg relative overflow-x-hidden">
    <div class="scanline"></div>
    <!-- TopNavBar -->
    <header class="bg-surface dark:bg-surface w-full border-b border-outline-variant z-10 sticky top-0">
        <div class="flex justify-between items-center w-full px-margin-desktop py-4 max-w-container-max mx-auto">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary dark:text-primary">terminal</span>
                <span
                    class="font-headline-md text-headline-md font-bold text-primary dark:text-primary tracking-tighter">AttendSecure</span>
            </div>
            <div class="flex items-center gap-4">
                <span
                    class="material-symbols-outlined text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-variant dark:hover:bg-surface-variant transition-colors cursor-pointer p-1 rounded-DEFAULT"
                    data-icon="lock">lock</span>
            </div>
        </div>
    </header>
    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop z-10">
        <div
            class="w-full max-w-md bg-surface-container border border-outline-variant rounded-DEFAULT shadow-[0_0_15px_rgba(203,166,247,0.05)] overflow-hidden">
            <!-- Card Header -->
            <div
                class="bg-surface-container-high px-6 py-4 border-b border-outline-variant flex items-center justify-between">
                <h1 class="font-headline-md text-headline-md text-primary">SECURE TERMINAL ACCESS</h1>
                <div class="flex gap-1">
                    <div class="w-2 h-2 rounded-full bg-error"></div>
                    <div class="w-2 h-2 rounded-full bg-tertiary"></div>
                    <div class="w-2 h-2 rounded-full bg-primary"></div>
                </div>
            </div>
            <!-- Card Body -->
            <div class="p-6 md:p-8 space-y-6">
                <div class="space-y-4">
                    <p class="font-code-inline text-code-inline text-on-surface-variant">System ready. Awaiting
                        authentication.</p>
                    <!-- Form -->
                    <form class="space-y-6" onsubmit="event.preventDefault();">
                        <div class="space-y-2 relative group">
                            <label class="block font-label-md text-label-md text-on-surface uppercase"
                                for="email">USER_ID</label>
                            <div
                                class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-3 py-2 group-focus-within:border-primary transition-colors">
                                <span class="text-primary mr-2">&gt;</span>
                                <input
                                    class="terminal-input bg-transparent border-none outline-none w-full text-on-surface font-code-inline text-code-inline focus:ring-0 p-0 placeholder-on-surface-variant/50"
                                    id="email" placeholder="admin@attendsecure.sys" required="" type="email" />
                                <span class="cursor hidden w-2 h-4 bg-primary ml-1"></span>
                            </div>
                        </div>
                        <div class="space-y-2 relative group">
                            <label class="block font-label-md text-label-md text-on-surface uppercase"
                                for="password">ACCESS_KEY</label>
                            <div
                                class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-3 py-2 group-focus-within:border-primary transition-colors">
                                <span class="text-primary mr-2">&gt;</span>
                                <input
                                    class="terminal-input bg-transparent border-none outline-none w-full text-on-surface font-code-inline text-code-inline focus:ring-0 p-0 placeholder-on-surface-variant/50"
                                    id="password" placeholder="••••••••••••" required="" type="password" />
                                <span class="cursor hidden w-2 h-4 bg-primary ml-1"></span>
                            </div>
                        </div>
                        <button
                            class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 px-4 rounded-DEFAULT hover:bg-primary-fixed transition-colors uppercase tracking-widest shadow-[0_0_10px_rgba(203,166,247,0.3)] hover:shadow-[0_0_20px_rgba(203,166,247,0.5)]"
                            type="submit">
                            INITIATE SESSION
                        </button>
                    </form>
                </div>
                <div class="flex justify-between items-center border-t border-outline-variant pt-4">
                    <a class="font-code-inline text-code-inline text-tertiary hover:text-tertiary-fixed transition-colors underline decoration-1 underline-offset-2"
                        href="#">Request Terminal Access</a>
                    <span
                        class="font-label-md text-label-md text-on-surface-variant bg-surface-variant px-2 py-1 rounded-DEFAULT">v2.4.1</span>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <footer
        class="bg-surface-container-lowest dark:bg-surface-container-lowest border-t border-outline-variant mt-auto w-full z-10">
        <div
            class="flex flex-col md:flex-row justify-between items-center px-margin-desktop py-4 max-w-container-max mx-auto gap-4 md:gap-0">
            <div class="font-label-md text-label-md text-outline dark:text-outline text-center md:text-left">
                © 2024 AttendSecure. AES-256 ENCRYPTED SESSION.
            </div>
            <div class="flex items-center gap-6">
                <a class="font-label-md text-label-md text-outline dark:text-outline hover:text-primary dark:hover:text-primary transition-colors"
                    href="#">Security Policy</a>
                <a class="font-label-md text-label-md text-outline dark:text-outline hover:text-primary dark:hover:text-primary transition-colors"
                    href="#">Terminal Access</a>
                <a class="font-label-md text-label-md text-outline dark:text-outline hover:text-primary dark:hover:text-primary transition-colors flex items-center gap-1"
                    href="#">
                    <span class="w-2 h-2 rounded-full bg-tertiary inline-block"></span> Status
                </a>
            </div>
        </div>
    </footer>
    <script>
        // Simple script to handle input focus styles for the custom terminal cursor
        document.querySelectorAll('.terminal-input').forEach(input => {
            input.addEventListener('focus', function () {
                this.nextElementSibling.classList.remove('hidden');
            });
            input.addEventListener('blur', function () {
                this.nextElementSibling.classList.add('hidden');
            });
        });
    </script>
</body>

</html>
